version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ~/.kube:/root/.kube:ro
    environment:
      - PORT=8080
      - NAMESPACE=securecodebox
    restart: unless-stopped

  # Frontend Vue.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

# Mode développement
# Pour le dev, utilisez plutôt:
#   cd backend && npm install && npm run dev
#   cd frontend && npm install && npm run dev
